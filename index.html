<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wayerman</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,700;1,400;1,500&family=Source+Serif+4:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#1C2B3A;--navy2:#243347;--cream:#FAFAF7;--warm:#F4F1EB;
  --ink:#111111;--muted:#888880;--rule:#E2DDD5;
  --gold:#9E8255;--gold2:#BFA278;
}
html{background:var(--cream)}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--ink);min-height:100vh;overflow-x:hidden}

.topbar{background:var(--navy);display:flex;align-items:center;justify-content:space-between;padding:0 2.5rem;height:44px;position:sticky;top:0;z-index:100}
.topbar-cats{display:flex;overflow-x:auto}
.topbar-cat{font-size:9px;font-weight:500;letter-spacing:2.5px;text-transform:uppercase;color:rgba(255,255,255,.45);padding:0 1rem;height:44px;display:flex;align-items:center;cursor:pointer;border-bottom:2px solid transparent;background:none;border-left:none;border-right:none;border-top:none;transition:color .2s,border-color .2s;white-space:nowrap}
.topbar-cat:hover{color:rgba(255,255,255,.85)}
.topbar-cat.active{color:#fff;border-bottom-color:var(--gold2)}
.topbar-right{display:flex;align-items:center;gap:12px;flex-shrink:0}
.topbar-date{font-size:8.5px;font-weight:300;letter-spacing:2px;color:rgba(255,255,255,.3);text-transform:uppercase;white-space:nowrap}
.topbar-status{font-size:8px;letter-spacing:1px;color:rgba(255,255,255,.35);white-space:nowrap;font-family:monospace}
.live-dot{width:5px;height:5px;border-radius:50%;background:#22C55E;display:inline-block;margin-right:5px;animation:blink 2s infinite;vertical-align:middle}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

.masthead{background:#fff;border-bottom:1px solid var(--rule);padding:1.6rem 2.5rem 1.4rem;display:flex;align-items:flex-end;justify-content:space-between;gap:2rem}
.masthead-logo{font-family:'Playfair Display',serif;font-size:52px;font-weight:700;color:var(--ink);letter-spacing:-1px;line-height:1}
.masthead-logo span{color:var(--navy)}
.masthead-center{flex:1;text-align:center;padding-bottom:4px}
.masthead-issue{font-size:8px;font-weight:500;letter-spacing:4px;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.masthead-rule{width:100%;height:1px;background:var(--rule);margin:6px 0}
.masthead-tagline{font-family:'Source Serif 4',serif;font-style:italic;font-size:12px;font-weight:300;color:var(--muted);letter-spacing:.5px}
.masthead-date-block{text-align:right;padding-bottom:4px}
.masthead-date{font-size:8px;font-weight:300;letter-spacing:2px;text-transform:uppercase;color:var(--muted)}

/* HERO */
.hero{display:grid;grid-template-columns:1fr 340px;background:#fff;border-bottom:1px solid var(--rule);min-height:480px}
.hero-lead{position:relative;overflow:hidden;cursor:pointer;border-right:1px solid var(--rule)}
.hero-lead-img{width:100%;height:480px;object-fit:cover;display:block;filter:brightness(.72) contrast(1.08);transition:transform .9s ease,filter .4s}
.hero-lead:hover .hero-lead-img{transform:scale(1.03);filter:brightness(.62)}
.hero-lead-overlay{position:absolute;inset:0;background:linear-gradient(180deg,transparent 30%,rgba(0,0,0,.88) 100%);pointer-events:none}
.hero-lead-body{position:absolute;bottom:0;left:0;right:0;padding:2.5rem 2.5rem 2rem}
.hero-eyebrow{display:inline-flex;align-items:center;gap:8px;margin-bottom:12px}
.hero-cat-label{font-size:8px;font-weight:500;letter-spacing:3px;text-transform:uppercase;color:var(--gold2)}
.hero-dot{width:3px;height:3px;border-radius:50%;background:var(--gold)}
.hero-source{font-size:8px;font-weight:300;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.55)}
.hero-title{font-family:'Playfair Display',serif;font-size:34px;font-weight:700;line-height:1.12;color:#fff;margin-bottom:14px;letter-spacing:-.3px}
.hero-deck{font-family:'Source Serif 4',serif;font-size:14px;font-weight:300;font-style:italic;color:rgba(255,255,255,.7);line-height:1.65;max-width:520px;margin-bottom:20px}
.hero-read{display:inline-flex;align-items:center;gap:10px;font-size:8.5px;font-weight:500;letter-spacing:3px;text-transform:uppercase;color:var(--gold2);cursor:pointer;transition:gap .2s}
.hero-read::after{content:'→'}
.hero-read:hover{gap:16px}

/* STACK */
.hero-stack{display:flex;flex-direction:column}
.stack-item{flex:1;padding:1.4rem 1.6rem;border-bottom:1px solid var(--rule);cursor:pointer;display:flex;flex-direction:column;justify-content:space-between;transition:background .2s;min-height:96px;position:relative;overflow:hidden}
.stack-item:last-child{border-bottom:none}
.stack-item:hover{background:var(--warm)}
.stack-item-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;filter:brightness(.18) contrast(1.1);transition:filter .3s}
.stack-item:hover .stack-item-img{filter:brightness(.12)}
.stack-item-content{position:relative;z-index:1}
.stack-cat{font-size:7.5px;font-weight:500;letter-spacing:3px;text-transform:uppercase;color:var(--gold2);margin-bottom:6px}
.stack-title{font-family:'Playfair Display',serif;font-size:15px;font-weight:500;line-height:1.3;color:#fff}
.stack-meta{font-size:8px;font-weight:300;letter-spacing:1px;color:rgba(255,255,255,.45);margin-top:8px}

/* DIVIDER */
.divider{display:flex;align-items:center;gap:1.25rem;padding:2rem 2.5rem .5rem;background:var(--cream)}
.divider-label{font-size:8.5px;font-weight:500;letter-spacing:5px;text-transform:uppercase;color:var(--navy);white-space:nowrap}
.divider-line{flex:1;height:1px;background:var(--rule)}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:0;background:#fff;border-top:1px solid var(--rule);border-bottom:1px solid var(--rule);margin-top:1.25rem}
.article{border-right:1px solid var(--rule);cursor:pointer;transition:background .2s}
.article:last-child{border-right:none}
.article:hover{background:var(--warm)}
.article-img-wrap{overflow:hidden}
.article-img{width:100%;height:220px;object-fit:cover;display:block;filter:brightness(.9) contrast(1.04) saturate(.9);transition:transform .7s ease,filter .3s}
.article:hover .article-img{transform:scale(1.04);filter:brightness(.8)}
.article-body{padding:1.4rem 1.6rem 1.75rem}
.article-cat{font-size:7.5px;font-weight:500;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:9px;display:flex;align-items:center;gap:6px}
.article-cat::before{content:'';display:inline-block;width:18px;height:1px;background:var(--gold)}
.article-title{font-family:'Playfair Display',serif;font-size:19px;font-weight:500;line-height:1.25;color:var(--ink);margin-bottom:8px;letter-spacing:-.2px}
.article-source{font-size:8px;font-weight:300;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase}

/* WIDE FEATURE */
.wide-feature{display:grid;grid-template-columns:1fr 1fr;border-top:1px solid var(--rule);background:#fff;cursor:pointer;transition:background .15s}
.wide-feature:hover{background:var(--warm)}
.wide-feature-img{width:100%;height:260px;object-fit:cover;filter:brightness(.85) contrast(1.05) saturate(.88);display:block;transition:filter .3s}
.wide-feature:hover .wide-feature-img{filter:brightness(.75)}
.wide-feature-body{padding:2rem 2.5rem;display:flex;flex-direction:column;justify-content:center;border-left:1px solid var(--rule)}
.wide-cat{font-size:7.5px;font-weight:500;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:12px;display:flex;align-items:center;gap:6px}
.wide-cat::before{content:'';display:inline-block;width:18px;height:1px;background:var(--gold)}
.wide-title{font-family:'Playfair Display',serif;font-size:26px;font-weight:700;line-height:1.18;color:var(--ink);margin-bottom:12px;letter-spacing:-.3px}
.wide-source{font-size:8px;font-weight:300;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:18px}
.wide-cta{font-size:8.5px;font-weight:500;letter-spacing:3px;text-transform:uppercase;color:var(--navy);display:inline-flex;align-items:center;gap:8px;transition:gap .2s;cursor:pointer}
.wide-cta::after{content:'→';color:var(--gold)}
.wide-cta:hover{gap:14px}

/* MORE LIST */
.more-section{background:#fff;border-top:1px solid var(--rule);margin-top:1.5rem}
.more-divider{display:flex;align-items:center;gap:1.25rem;padding:1.5rem 2.5rem .75rem;background:var(--cream)}
.more-item{display:grid;grid-template-columns:140px 1fr;border-bottom:1px solid var(--rule);cursor:pointer;transition:background .15s}
.more-item:hover{background:var(--warm)}
.more-item-img{width:140px;height:90px;object-fit:cover;filter:saturate(.88);display:block;transition:filter .3s}
.more-item:hover .more-item-img{filter:saturate(1.05)}
.more-item-body{padding:1rem 1.4rem;display:flex;flex-direction:column;justify-content:center;gap:4px}
.more-item-cat{font-size:7px;font-weight:500;letter-spacing:3px;text-transform:uppercase;color:var(--gold)}
.more-item-title{font-family:'Playfair Display',serif;font-size:15px;font-weight:500;line-height:1.3;color:var(--ink)}
.more-item-source{font-size:8px;color:var(--muted);letter-spacing:1px;text-transform:uppercase}

/* FOOTER */
footer{background:var(--navy);padding:2rem 2.5rem;display:flex;align-items:center;justify-content:space-between;margin-top:2rem}
.footer-logo{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:#fff;letter-spacing:-.5px}
.footer-logo span{color:var(--gold2)}
.footer-links{display:flex;gap:2rem}
.footer-link{font-size:8.5px;font-weight:300;letter-spacing:2.5px;text-transform:uppercase;color:rgba(255,255,255,.35);cursor:pointer;transition:color .2s}
.footer-link:hover{color:rgba(255,255,255,.7)}
.footer-copy{font-size:8px;font-weight:300;letter-spacing:1.5px;color:rgba(255,255,255,.2)}

/* MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(28,43,58,.9);z-index:200;justify-content:center;align-items:flex-start;padding:2rem 1rem;overflow-y:auto}
.modal-bg.open{display:flex}
.modal{background:#fff;max-width:720px;width:100%;border-top:3px solid var(--navy);position:relative}
.modal-x{position:absolute;top:.9rem;right:1rem;background:none;border:none;font-size:18px;color:var(--muted);cursor:pointer;line-height:1;transition:color .2s;z-index:1}
.modal-x:hover{color:var(--ink)}
.modal-hero-img{width:100%;height:320px;object-fit:cover;display:block}
.modal-body{padding:2.25rem 2.75rem 3rem}
.modal-eyebrow{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.modal-cat{font-size:8px;font-weight:500;letter-spacing:4px;text-transform:uppercase;color:var(--gold);display:flex;align-items:center;gap:8px}
.modal-cat::before{content:'';display:inline-block;width:22px;height:1px;background:var(--gold)}
.modal-pub{font-size:8px;font-weight:500;letter-spacing:2px;text-transform:uppercase;color:var(--navy);padding:3px 8px;border:1px solid var(--navy);border-radius:2px}
.modal-title{font-family:'Playfair Display',serif;font-size:30px;font-weight:700;line-height:1.15;color:var(--ink);margin-bottom:14px;letter-spacing:-.4px}
.modal-deck{font-family:'Source Serif 4',serif;font-size:14px;font-weight:300;font-style:italic;color:var(--muted);line-height:1.8;margin-bottom:2rem;border-left:2px solid var(--rule);padding-left:1.25rem}
.modal-btn{display:inline-flex;align-items:center;gap:10px;background:var(--navy);color:#fff;font-family:'DM Sans',sans-serif;font-size:8.5px;font-weight:500;letter-spacing:3px;text-transform:uppercase;padding:14px 28px;text-decoration:none;transition:background .2s}
.modal-btn:hover{background:var(--navy2)}

/* SKELETON */
.sk{background:linear-gradient(90deg,#e8e4de 25%,#f0ece5 50%,#e8e4de 75%);background-size:200% 100%;animation:sh 1.4s infinite;border-radius:2px}
@keyframes sh{0%{background-position:200% 0}100%{background-position:-200% 0}}
.sk-hero{height:480px}

@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
.fadein{animation:fadeUp .5s ease both}

@media(max-width:768px){
  .hero{grid-template-columns:1fr}.hero-stack{display:none}
  .grid{grid-template-columns:1fr}.wide-feature{grid-template-columns:1fr}
  .topbar{padding:0 1rem}.masthead{padding:1rem}
  .masthead-logo{font-size:36px}.masthead-center,.masthead-date-block{display:none}
  footer{flex-direction:column;gap:1rem;align-items:flex-start}
}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-cats">
    <button class="topbar-cat active" data-cat="all">Todo</button>
    <button class="topbar-cat" data-cat="moda">Moda</button>
    <button class="topbar-cat" data-cat="relojes">Relojes</button>
    <button class="topbar-cat" data-cat="whisky">Whisky &amp; Spirits</button>
    <button class="topbar-cat" data-cat="autos">Autos</button>
    <button class="topbar-cat" data-cat="formula1">Formula 1</button>
    <button class="topbar-cat" data-cat="clase">Clase &amp; Estilo</button>
  </div>
  <div class="topbar-right">
    <div class="topbar-date" id="topbar-date"></div>
    <div class="topbar-status" id="topbar-status"><span class="live-dot"></span>cargando…</div>
  </div>
</div>

<div class="masthead">
  <div class="masthead-logo">Way<span>erman</span></div>
  <div class="masthead-center">
    <div class="masthead-issue">Edición Digital · En Vivo</div>
    <div class="masthead-rule"></div>
    <div class="masthead-tagline">Curated for the discerning gentleman</div>
  </div>
  <div class="masthead-date-block">
    <div class="masthead-date" id="mast-date"></div>
  </div>
</div>

<div class="hero">
  <div class="hero-lead" id="hero-lead"><div class="sk sk-hero"></div></div>
  <div class="hero-stack" id="hero-stack"></div>
</div>

<div id="grid-wrap" style="display:none">
  <div class="divider"><span class="divider-label">Lo Más Reciente</span><div class="divider-line"></div></div>
  <div class="grid" id="main-grid"></div>
</div>

<div id="wide-wrap"></div>
<div id="more-wrap"></div>

<footer>
  <div class="footer-logo">Way<span>erman</span></div>
  <div class="footer-links">
    <span class="footer-link" onclick="switchCat('moda')">Moda</span>
    <span class="footer-link" onclick="switchCat('relojes')">Relojes</span>
    <span class="footer-link" onclick="switchCat('whisky')">Whisky</span>
    <span class="footer-link" onclick="switchCat('autos')">Autos</span>
    <span class="footer-link" onclick="switchCat('formula1')">Formula 1</span>
  </div>
  <div class="footer-copy">© 2025 Wayerman</div>
</footer>

<div class="modal-bg" id="modal-bg" onclick="closeMbg(event)">
  <div class="modal">
    <button class="modal-x" onclick="closeModal()">✕</button>
    <img class="modal-hero-img" id="m-img" src="" alt="">
    <div class="modal-body">
      <div class="modal-eyebrow">
        <div class="modal-cat" id="m-cat"></div>
        <div class="modal-pub" id="m-pub"></div>
      </div>
      <div class="modal-title" id="m-title"></div>
      <div class="modal-deck" id="m-deck"></div>
      <a class="modal-btn" id="m-link" href="#" target="_blank" rel="noopener">Leer en <span id="m-source-name"></span> →</a>
    </div>
  </div>
</div>

<script>
const CL={moda:'Moda',relojes:'Relojes',whisky:'Whisky & Spirits',formula1:'Formula 1',autos:'Autos',clase:'Clase & Estilo'};

const FALLBACK={
  moda:    'https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=900&q=85&auto=format',
  relojes: 'https://images.unsplash.com/photo-1523170335258-f5ed11844a49?w=900&q=85&auto=format',
  whisky:  'https://images.unsplash.com/photo-1527281400683-1aefee6f8d84?w=900&q=85&auto=format',
  formula1:'https://images.unsplash.com/photo-1558618666-fcd25c85cd64?w=900&q=85&auto=format',
  autos:   'https://images.unsplash.com/photo-1617531653332-bd46c16f981f?w=900&q=85&auto=format',
  clase:   'https://images.unsplash.com/photo-1414235077428-338989a2e8c0?w=900&q=85&auto=format',
};

/* Feeds directos de publicaciones reales de lujo — imagen y URL propias de cada medio */
const FEEDS={
  moda:[
    {url:'https://www.gq.com/feed/rss',            source:'GQ'},
    {url:'https://www.esquire.com/rss/all.xml',     source:'Esquire'},
    {url:'https://hypebeast.com/feed',              source:'Hypebeast'},
  ],
  relojes:[
    {url:'https://www.hodinkee.com/feed',                          source:'Hodinkee'},
    {url:'https://www.watchtime.com/feed/',                        source:'WatchTime'},
    {url:'https://robbreport.com/style/watch-collector/feed/',     source:'Robb Report'},
  ],
  whisky:[
    {url:'https://www.whiskyadvocate.com/feed/',   source:'Whisky Advocate'},
    {url:'https://www.whisky.com/news/feed.rss',   source:'Whisky.com'},
    {url:'https://www.decanter.com/feed/',         source:'Decanter'},
  ],
  autos:[
    {url:'https://robbreport.com/motors/feed/',             source:'Robb Report'},
    {url:'https://www.topgear.com/rss.xml',                 source:'Top Gear'},
    {url:'https://www.caranddriver.com/rss/all.xml/',       source:'Car and Driver'},
    {url:'https://www.roadandtrack.com/rss/all.xml/',       source:'Road & Track'},
  ],
  formula1:[
    {url:'https://www.motorsport.com/rss/f1/news/',  source:'Motorsport.com'},
    {url:'https://www.autosport.com/rss/f1/news',    source:'Autosport'},
    {url:'https://www.racefans.net/feed/',            source:'RaceFans'},
  ],
  clase:[
    {url:'https://robbreport.com/feed/',                          source:'Robb Report'},
    {url:'https://www.architecturaldigest.com/feed/rss',          source:'Architectural Digest'},
    {url:'https://www.departures.com/rss/all',                    source:'Departures'},
    {url:'https://www.townandcountrymag.com/rss/all.xml/',        source:'Town & Country'},
  ],
};

let articles=[];
let currentCat='all';
let cdSecs=60;
let cdTimer;

/* ── UTILS ── */
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function stripHtml(h){const d=document.createElement('div');d.innerHTML=h||'';return d.textContent.trim().slice(0,260);}
function imgOf(a){return a.img||FALLBACK[a.cat]||FALLBACK.clase;}
function safeImg(el,src,cat){el.src=src;el.onerror=()=>{el.src=FALLBACK[cat]||FALLBACK.clase;el.onerror=null;};}
function setStatus(t){document.getElementById('topbar-status').innerHTML='<span class="live-dot"></span>'+t;}

/* ── FETCH via rss2json — convierte RSS a JSON y extrae thumbnail del medio original ── */
async function fetchFeed({url,source},cat){
  try{
    const r=await fetch('https://api.rss2json.com/v1/api.json?rss_url='+encodeURIComponent(url),
      {signal:AbortSignal.timeout(10000)});
    if(!r.ok)return[];
    const j=await r.json();
    if(j.status!=='ok'||!j.items?.length)return[];
    const seen=new Set();
    return j.items.slice(0,10).map(item=>{
      const title=(item.title||'').trim();
      if(!title||!item.link)return null;
      const key=title.toLowerCase().slice(0,32);
      if(seen.has(key))return null;
      seen.add(key);
      /* thumbnail viene del <media:content> o <enclosure> del RSS original */
      const img=(item.thumbnail&&item.thumbnail.startsWith('http')&&!item.thumbnail.includes('1x1'))?item.thumbnail:'';
      return{
        id:btoa(encodeURIComponent(item.link)).slice(0,16),
        cat,title,
        url:item.link,          /* URL directa al artículo en el medio original */
        img,
        deck:stripHtml(item.description||item.content||''),
        source,                 /* nombre del medio desde la definición del feed */
        time:new Date(item.pubDate||0).getTime(),
      };
    }).filter(Boolean);
  }catch(e){return[];}
}

/* ── LOAD ── */
async function loadFeed(cat){
  currentCat=cat;
  setStatus('actualizando…');
  clearInterval(cdTimer);
  renderSkeleton();

  const entries=cat==='all'
    ?Object.entries(FEEDS).flatMap(([k,feeds])=>feeds.map(f=>({feed:f,cat:k})))
    :(FEEDS[cat]||[]).map(f=>({feed:f,cat}));

  const results=await Promise.all(entries.map(({feed,cat:c})=>fetchFeed(feed,c)));

  const seenTitles=new Set();
  articles=results.flat()
    .filter(a=>{
      const key=a.title.toLowerCase().slice(0,32);
      if(seenTitles.has(key))return false;
      seenTitles.add(key);return true;
    })
    .sort((a,b)=>b.time-a.time)
    .slice(0,24);

  if(!articles.length){renderEmpty();return;}
  render(articles);

  cdSecs=60;
  setStatus('en vivo · ↻ 60s');
  cdTimer=setInterval(()=>{
    cdSecs--;
    if(cdSecs<=0){loadFeed(currentCat);return;}
    setStatus('en vivo · ↻ '+cdSecs+'s');
  },1000);
}

/* ── RENDER ── */
function render(items){
  renderHero(items[0]);
  renderStack(items.slice(1,5));
  renderGrid(items.slice(5,8));
  renderWide(items[8]);
  renderMore(items.slice(9,18));
}

function mkImg(cls,a){
  const el=document.createElement('img');
  el.className=cls;el.alt='';
  safeImg(el,imgOf(a),a.cat);
  return el;
}

function renderHero(a){
  if(!a)return;
  const lead=document.getElementById('hero-lead');
  lead.innerHTML='';lead.className='hero-lead fadein';lead.onclick=()=>openModal(0);
  const img=mkImg('hero-lead-img',a);
  const overlay=document.createElement('div');overlay.className='hero-lead-overlay';
  const body=document.createElement('div');body.className='hero-lead-body';
  body.innerHTML=
    `<div class="hero-eyebrow">`+
      `<span class="hero-cat-label">${esc(CL[a.cat]||a.cat)}</span>`+
      `<span class="hero-dot"></span>`+
      `<span class="hero-source">${esc(a.source)}</span>`+
    `</div>`+
    `<div class="hero-title">${esc(a.title)}</div>`+
    (a.deck?`<div class="hero-deck">${esc(a.deck)}</div>`:'')+
    `<span class="hero-read">Leer artículo completo</span>`;
  lead.append(img,overlay,body);
}

function renderStack(items){
  const el=document.getElementById('hero-stack');el.innerHTML='';
  items.forEach((a,i)=>{
    const d=document.createElement('div');d.className='stack-item';d.onclick=()=>openModal(i+1);
    const img=mkImg('stack-item-img',a);
    const c=document.createElement('div');c.className='stack-item-content';
    c.innerHTML=
      `<div class="stack-cat">${esc(CL[a.cat]||a.cat)}</div>`+
      `<div class="stack-title">${esc(a.title)}</div>`+
      `<div class="stack-meta">${esc(a.source)}</div>`;
    d.append(img,c);el.appendChild(d);
  });
}

function renderGrid(items){
  const valid=items.filter(Boolean);
  const wrap=document.getElementById('grid-wrap');
  if(!valid.length){wrap.style.display='none';return;}
  wrap.style.display='';
  const el=document.getElementById('main-grid');el.innerHTML='';
  valid.forEach((a,i)=>{
    const d=document.createElement('div');d.className='article';d.onclick=()=>openModal(i+5);
    const iw=document.createElement('div');iw.className='article-img-wrap';
    const img=mkImg('article-img',a);iw.appendChild(img);
    const body=document.createElement('div');body.className='article-body';
    body.innerHTML=
      `<div class="article-cat">${esc(CL[a.cat]||a.cat)}</div>`+
      `<div class="article-title">${esc(a.title)}</div>`+
      `<div class="article-source">${esc(a.source)}</div>`;
    d.append(iw,body);el.appendChild(d);
  });
}

function renderWide(a){
  const el=document.getElementById('wide-wrap');el.innerHTML='';
  if(!a)return;
  const d=document.createElement('div');d.className='wide-feature';d.onclick=()=>openModal(8);
  const img=mkImg('wide-feature-img',a);
  const body=document.createElement('div');body.className='wide-feature-body';
  body.innerHTML=
    `<div class="wide-cat">${esc(CL[a.cat]||a.cat)}</div>`+
    `<div class="wide-title">${esc(a.title)}</div>`+
    `<div class="wide-source">${esc(a.source)}</div>`+
    `<span class="wide-cta">Leer artículo completo</span>`;
  d.append(img,body);el.appendChild(d);
}

function renderMore(items){
  const el=document.getElementById('more-wrap');el.innerHTML='';
  const valid=items.filter(Boolean);if(!valid.length)return;
  const section=document.createElement('div');section.className='more-section';
  const hdr=document.createElement('div');hdr.className='more-divider';
  hdr.innerHTML='<div class="divider-label">Más Noticias</div><div class="divider-line"></div>';
  section.appendChild(hdr);
  valid.forEach((a,i)=>{
    const d=document.createElement('div');d.className='more-item';d.onclick=()=>openModal(i+9);
    const img=mkImg('more-item-img',a);
    const body=document.createElement('div');body.className='more-item-body';
    body.innerHTML=
      `<div class="more-item-cat">${esc(CL[a.cat]||a.cat)}</div>`+
      `<div class="more-item-title">${esc(a.title)}</div>`+
      `<div class="more-item-source">${esc(a.source)}</div>`;
    d.append(img,body);section.appendChild(d);
  });
  el.appendChild(section);
}

function renderSkeleton(){
  document.getElementById('hero-lead').innerHTML='<div class="sk sk-hero"></div>';
  ['hero-stack','main-grid','wide-wrap','more-wrap'].forEach(id=>document.getElementById(id).innerHTML='');
  document.getElementById('grid-wrap').style.display='none';
}

function renderEmpty(){
  document.getElementById('hero-lead').innerHTML=
    '<div style="height:480px;display:flex;align-items:center;justify-content:center;color:#888;font-size:13px;letter-spacing:1px">Sin noticias disponibles · reintentando…</div>';
}

/* ── MODAL — abre resumen y botón directo al medio original ── */
function openModal(i){
  const a=articles[i];if(!a)return;
  safeImg(document.getElementById('m-img'),imgOf(a),a.cat);
  document.getElementById('m-cat').textContent=CL[a.cat]||a.cat;
  document.getElementById('m-pub').textContent=a.source;
  document.getElementById('m-title').textContent=a.title;
  document.getElementById('m-deck').textContent=a.deck||'';
  document.getElementById('m-deck').style.display=a.deck?'':'none';
  document.getElementById('m-link').href=a.url;
  document.getElementById('m-source-name').textContent=a.source;
  document.getElementById('modal-bg').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeModal(){document.getElementById('modal-bg').classList.remove('open');document.body.style.overflow='';}
function closeMbg(e){if(e.target===document.getElementById('modal-bg'))closeModal();}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});

/* ── TABS ── */
function switchCat(cat){
  document.querySelectorAll('.topbar-cat').forEach(b=>b.classList.toggle('active',b.dataset.cat===cat));
  loadFeed(cat);
}
document.querySelectorAll('.topbar-cat').forEach(b=>b.addEventListener('click',()=>switchCat(b.dataset.cat)));

/* ── DATE ── */
const meses=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
const hoy=new Date();
const ds=`${hoy.getDate()} de ${meses[hoy.getMonth()]} de ${hoy.getFullYear()}`;
document.getElementById('topbar-date').textContent=ds;
document.getElementById('mast-date').textContent=ds;

loadFeed('all');
</script>
</body>
</html>
